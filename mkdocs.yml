site_name: NextPilot 帮助文档
site_url: https://docs.nextpilot.org
site_author: NextPilot Development Team
site_description: NextPilot, a powerful, scalable and advanced autopilot.

# repo_name: nextpilot.github.io
# repo_url: https://github.com/nextpilot/nextpilot.github.io/

# edit_uri: blob/main/docs/
# edit_uri_template: 'blob/main/docs/{path}'
# remote_branch: gh-pages
# remote_name: origin

docs_dir: docs
site_dir: build/gh-pages

use_directory_urls: false

exclude_docs: |
  aboutus/events.md
  aboutus/history.md
  aboutus/roadmap.md
  manual/00-基本概念

dev_addr: "127.0.0.1:8063"

copyright: Copyright &copy; 2015-2026 <a href="https://nextpilot.org">NextPilot Development Team</a>.<br />
# <a href="https://beian.miit.gov.cn/" target="_blank">蜀ICP备2024093355号-3</a>

theme:
  name: material
  custom_dir: overrides
  favicon: favicon.png
  logo: favicon.png
  features:
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - navigation.path
    - search.highlightsearch
    - search.suggest
    - search.share
    - toc.follow
  language: zh
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: True
      separator: "_"

  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: underscore
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      use_pygments: false
      linenums: true
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# - mdx_gh_links:
#       user: mkdocs
#       repo: mkdocs
# - mkdocs-click
# - callouts

plugins:
  - search:
     lang: [zh, en]
  - tags
  - autorefs
  - awesome-nav
  # - literate-nav:
  #     nav_file: SUMMARY.md
  #     implicit_index: false
  #     tab_length: 2
  # - mkdocstrings:
  #     handlers:
  #       python:
  #         options:
  #           docstring_section_style: list
  #           members_order: source
  #           show_root_heading: true
  #           show_source: false
  #           show_signature_annotations: true
  - i18n:
      docs_structure: suffix
      # default_language: zh
      languages:
        - locale: zh
          name: 简体中文
          default: true
          build: true        
        - locale: en
          name: English
          build: true
      reconfigure_material: true
  - mike
  # - git-revision-date-localized:
  #     enable_creation_date: true

not_in_nav: |
  /**/SUMMARY.md
  /**/README.md

extra_css:
  - stylesheets/home.css

extra:
  version:
    method: mike
  generator: false
  alternate:
    - name: English
      link: /en/
      lang: en

    - name: 简体中文
      link: /zh/
      lang: zh

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
